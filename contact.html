<main>
    <!-- Contact Form Section -->
    <section class="relative min-h-screen flex flex-col justify-center px-margin-mobile md:px-margin-desktop py-20 overflow-hidden">
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full h-full pointer-events-none opacity-20 bottom-6">
            <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-primary/20 rounded-full blur-[120px]"></div>
        </div>
        <div class="relative z-10 max-w-4xl mx-auto w-full">
            <h1 class="font-display-lg text-display-lg md:text-[80px] leading-tight mb-8 text-center">Contact Me</h1>
            <p class="font-body-md text-body-md md:text-xl text-on-surface-variant max-w-2xl mb-12 leading-relaxed text-center mx-auto">Have a question or want to work together? Fill out the form below and I'll get back to you as soon as possible.</p>
            
            <form class="space-y-6">
                <div>
                    <label for="name" class="font-label-caps text-label-caps text-on-surface-variant uppercase">Name</label>
                    <input type="text" id="name" name="name" class="w-full bg-surface-container-low border border-outline-variant/30 rounded-lg p-4 mt-2 focus:outline-none focus:ring-2 focus:ring-primary">
                </div>
                <div>
                    <label for="email" class="font-label-caps text-label-caps text-on-surface-variant uppercase">Email</label>
                    <input type="email" id="email" name="email" class="w-full bg-surface-container-low border border-outline-variant/30 rounded-lg p-4 mt-2 focus:outline-none focus:ring-2 focus:ring-primary">
                </div>
                <div>
                    <label for="message" class="font-label-caps text-label-caps text-on-surface-variant uppercase">Message</label>
                    <textarea id="message" name="message" rows="4" class="w-full bg-surface-container-low border border-outline-variant/30 rounded-lg p-4 mt-2 focus:outline-none focus:ring-2 focus:ring-primary"></textarea>
                </div>
                <div class="text-center">
                    <button type="submit" class="bg-primary px-8 py-4 rounded-lg font-bold text-on-primary hover:bg-primary-container transition-all active:scale-95 flex items-center gap-2 mx-auto">
                        <span class="material-symbols-outlined">send</span> Submit
                    </button>
                </div>
            </form>
        </div>
    </section>
</main>
